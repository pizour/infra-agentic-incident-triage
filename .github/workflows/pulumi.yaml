name: Pulumi Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/pulumi.yaml"
  pull_request:
    paths:
      - "infrastructure/**"
      - ".github/workflows/pulumi.yaml"

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  ENVIRONMENT: ${{ vars.GCP_ENVIRONMENT || 'dev' }}
  GAR_LOCATION: ${{ vars.GCP_REGION }}-docker.pkg.dev
  GAR_REPOSITORY: gke-artifacts-${{ vars.GCP_ENVIRONMENT || 'dev' }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

jobs:
  preview:
    name: Pulumi Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    permissions:
      contents: "read"
      id-token: "write"
      pull-requests: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Auth to GCP is required for Pulumi GCP provider
      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: "Set up Cloud SDK & Auth Plugin"
        uses: "google-github-actions/setup-gcloud@v2"
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pulumi Preview
        uses: pulumi/actions@v5
        with:
          command: preview
          stack-name: dev
          work-dir: infrastructure
          comment-on-pr: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  up:
    name: Pulumi Up
    needs: preview
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./infrastructure
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Auth to GCP is required for Pulumi GCP provider
      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: "Set up Cloud SDK & Auth Plugin"
        uses: "google-github-actions/setup-gcloud@v2"
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pulumi Up
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: dev
          work-dir: infrastructure
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  install-secrets:
    name: Install Kubernetes Secrets
    needs: up
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: gke-cluster-${{ env.ENVIRONMENT }}
          location: ${{ env.REGION }}-a

      - name: Install Secrets
        run: |
          kubectl create namespace ai-agent --dry-run=client -o yaml | kubectl apply -f -

          # AI Agent Secrets
          kubectl create secret generic ai-agent-secrets \
            --namespace ai-agent \
            --from-literal=APP_API_KEY=${{ secrets.APP_API_KEY }} \
            --from-literal=MCP_API_KEY=${{ secrets.MCP_API_KEY }} \
            --from-literal=NETBOX_MCP_API_KEY=${{ secrets.NETBOX_MCP_API_KEY }} \
            --from-literal=ZAMMAD_TOKEN=${{ secrets.ZAMMAD_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # Linux MCP Server Secrets
          kubectl create secret generic linux-mcp-server-secrets \
            --namespace ai-agent \
            --from-literal=MCP_API_KEY=${{ secrets.MCP_API_KEY }} \
            --from-literal=REMOTE_USER=${{ secrets.REMOTE_USER }} \
            --from-literal=REMOTE_PASS=${{ secrets.REMOTE_PASS }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # NetBox MCP Server Secrets
          kubectl create secret generic netbox-mcp-server-secrets \
            --namespace ai-agent \
            --from-literal=NETBOX_API_TOKEN=${{ secrets.NETBOX_API_TOKEN }} \
            --from-literal=NETBOX_MCP_API_KEY=${{ secrets.NETBOX_MCP_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -
