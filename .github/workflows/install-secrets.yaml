name: Install Kubernetes Secrets

on:
  workflow_dispatch:
  workflow_call:

env:
  REGION: ${{ vars.GCP_REGION }}
  ENVIRONMENT: ${{ vars.GCP_ENVIRONMENT || 'dev' }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

jobs:
  install-secrets:
    name: Install Kubernetes Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: gke-cluster-${{ env.ENVIRONMENT }}
          location: ${{ env.REGION }}-a

      - name: Install Secrets
        run: |
          kubectl create namespace ai-agent --dry-run=client -o yaml | kubectl apply -f -

          # AI Agent Secrets
          kubectl create secret generic ai-agent-secrets \
            --namespace ai-agent \
            --from-literal=APP_API_KEY=${{ secrets.APP_API_KEY }} \
            --from-literal=MCP_API_KEY=${{ secrets.MCP_API_KEY }} \
            --from-literal=NETBOX_MCP_API_KEY=${{ secrets.NETBOX_MCP_API_KEY }} \
            --from-literal=ZAMMAD_TOKEN=${{ secrets.ZAMMAD_TOKEN }} \
            --from-literal=ZAMMAD_USER=${{ secrets.ZAMMAD_ADMIN_EMAIL }} \
            --from-literal=ZAMMAD_PASS=${{ secrets.ZAMMAD_ADMIN_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # Linux MCP Server Secrets
          kubectl create secret generic linux-mcp-server-secrets \
            --namespace ai-agent \
            --from-literal=MCP_API_KEY=${{ secrets.MCP_API_KEY }} \
            --from-literal=REMOTE_USER=${{ secrets.REMOTE_USER }} \
            --from-literal=REMOTE_PASS=${{ secrets.REMOTE_PASS }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # NetBox MCP Server Secrets
          kubectl create secret generic netbox-mcp-server-secrets \
            --namespace ai-agent \
            --from-literal=NETBOX_API_TOKEN=${{ secrets.NETBOX_API_TOKEN }} \
            --from-literal=NETBOX_MCP_API_KEY=${{ secrets.NETBOX_MCP_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # GitHub MCP Server Secrets
          kubectl create secret generic github-mcp-server-secrets \
            --namespace ai-agent \
            --from-literal=GITHUB_PERSONAL_ACCESS_TOKEN=${{ secrets.GH_PERSONAL_ACCESS_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # Zammad Secrets
          kubectl create namespace zammad --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic zammad-secrets \
            --namespace zammad \
            --from-literal=ZAMMAD_DB_PASS=${{ secrets.ZAMMAD_DB_PASS }} \
            --from-literal=ZAMMAD_ADMIN_EMAIL=${{ secrets.ZAMMAD_ADMIN_EMAIL }} \
            --from-literal=ZAMMAD_ADMIN_PASSWORD=${{ secrets.ZAMMAD_ADMIN_PASSWORD }} \
            --from-literal=ZAMMAD_ADMIN_FIRSTNAME=${{ secrets.ZAMMAD_ADMIN_FIRSTNAME }} \
            --from-literal=ZAMMAD_ADMIN_LASTNAME=${{ secrets.ZAMMAD_ADMIN_LASTNAME }} \
            --dry-run=client -o yaml | kubectl apply -f -
