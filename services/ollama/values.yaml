ollama:
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 11434
  persistence:
    size: 50Gi
    storageClass: ""
  models:
    - "llama3.1:8b"
    - "llama3.2:3b"
  resources:
    limits:
      nvidia.com/gpu: 1
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
  nodeSelector:
    gpu-node: "true"

webui:
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: main
    pullPolicy: IfNotPresent
  service:
    port: 3001
    targetPort: 8080
  persistence:
    size: 20Gi
    storageClass: ""

fullnameOverride: "ollama-stack"

secrets:
  WEBUI_SECRET_KEY: "no-key-yet"
