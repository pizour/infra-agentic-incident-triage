apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ollama.fullname" . }}-webui
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ include "ollama.fullname" . }}-webui
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: open-webui
          image: "{{ .Values.webui.image.repository }}:{{ .Values.webui.image.tag }}"
          imagePullPolicy: {{ .Values.webui.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: "http://{{ include "ollama.fullname" . }}-ollama:11434"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ollama.fullname" . }}-secrets
                  key: WEBUI_SECRET_KEY
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
  volumeClaimTemplates:
    - metadata:
        name: open-webui-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.webui.persistence.storageClass }}
        storageClassName: {{ .Values.webui.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.webui.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ollama.fullname" . }}-webui
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webui.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
