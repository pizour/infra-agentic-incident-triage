apiVersion: v1
kind: Service
metadata:
  name: {{ include "analysis-agent.fullname" . }}
  labels: {{- include "analysis-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector: {{- include "analysis-agent.selectorLabels" . | nindent 4 }}
