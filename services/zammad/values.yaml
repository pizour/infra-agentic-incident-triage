fullnameOverride: "zammad"

db:
  image:
    repository: postgres
    tag: 15-alpine
    pullPolicy: IfNotPresent
  user: zammad
  database: zammad
  service:
    port: 5432
  persistence:
    size: 50Gi
    storageClass: "standard"

redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379

elasticsearch:
  image:
    repository: elasticsearch
    tag: 8.11.3
    pullPolicy: IfNotPresent
  service:
    port: 9200
  persistence:
    size: 20Gi
    storageClass: "standard"

app:
  image:
    repository: zammad/zammad-docker-compose
    tag: zammad-latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  persistence:
    size: 50Gi
    storageClass: "standard"

secrets:
  ZAMMAD_DB_PASS: "zammadpassword"
