apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "langgraph-fabric.fullname" . }}-pod-creator-binding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "langgraph-fabric.fullname" . }}-pod-creator
subjects:
- kind: ServiceAccount
  name: {{ include "langgraph-fabric.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
