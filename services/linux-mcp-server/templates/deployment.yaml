apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "linux-mcp-server.fullname" . }}
  labels:
    {{- include "linux-mcp-server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "linux-mcp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "linux-mcp-server.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.project }}/{{ .Values.image.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "linux-mcp-server.fullname" . }}-secrets
                  key: MCP_API_KEY
            - name: REMOTE_HOST
              value: {{ .Values.remoteHost | default "" | quote }}
            - name: REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "linux-mcp-server.fullname" . }}-secrets
                  key: REMOTE_USER
            - name: REMOTE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "linux-mcp-server.fullname" . }}-secrets
                  key: REMOTE_PASS
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
