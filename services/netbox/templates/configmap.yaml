apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "netbox.fullname" . }}-env
data:
  DB_HOST: {{ include "netbox.fullname" . }}-db
  DB_NAME: {{ .Values.db.database | quote }}
  DB_USER: {{ .Values.db.user | quote }}
  REDIS_HOST: {{ include "netbox.fullname" . }}-redis
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "netbox.fullname" . }}-extra-config
data:
  extra.py: |-
{{ .Values.app.extraPy | indent 4 }}
