apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbox.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: netbox-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbox-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbox-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command:
            - /opt/netbox/venv/bin/python
            - /opt/netbox/netbox/manage.py
            - rqworker
          envFrom:
            - configMapRef:
                name: {{ include "netbox.fullname" . }}-env
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox.fullname" . }}-secrets
                  key: NETBOX_DB_PASS
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "netbox.fullname" . }}-secrets
                  key: NETBOX_SECRET_KEY
          volumeMounts:
            - name: extra-config
              mountPath: /etc/netbox/config/extra.py
              subPath: extra.py
              readOnly: true
      volumes:
        - name: extra-config
          configMap:
            name: {{ include "netbox.fullname" . }}-extra-config
