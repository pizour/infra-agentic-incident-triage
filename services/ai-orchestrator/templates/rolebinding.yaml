apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "new-orchestrator.fullname" . }}-pod-creator-binding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "new-orchestrator.fullname" . }}-pod-creator
subjects:
- kind: ServiceAccount
  name: {{ include "new-orchestrator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
