server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ssh-auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: ssh-auth
          __path__: /var/log/auth.log
    pipeline_stages:
      - regex:
          expression: '.*sshd.*(?:Failed password|Accepted password|Invalid user).*from (?P<source_ip>\d+\.\d+\.\d+\.\d+).*'
      - labels:
          source_ip:
      - template:
          source: host
          template: '{{ .Env "HOSTNAME" }}'
      - labels:
          host:
      - template:
          source: host_ip
          template: '{{ .Env "HOST_IP" }}'
      - labels:
          host_ip:

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log
    pipeline_stages:
      - template:
          source: host
          template: '{{ .Env "HOSTNAME" }}'
      - labels:
          host:
