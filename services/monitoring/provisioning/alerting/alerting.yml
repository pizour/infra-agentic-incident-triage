apiVersion: 1

contactPoints:
  - name: "FastAPI Webhook"
    receivers:
      - uid: "fastapi-webhook"
        type: "webhook"
        settings:
          url: "http://ai-agent.ai-agent.svc.cluster.local:8000/webhook"
          httpMethod: "POST"

policies:
  - orgId: 1
    receiver: "FastAPI Webhook"
    group_by: ["alertname", "host", "host_ip", "source_ip"]

groups:
  - orgId: 1
    name: "SSH Security"
    folder: "Security"
    interval: "10s"
    rules:
      - uid: "ssh-failed-login"
        title: "Failed SSH Login Attempt"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "loki-datasource"
            model:
              expr: 'sum by (host, host_ip, source_ip) (count_over_time({job="ssh-auth"} |= "Failed password" [30s]))'
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            datasourceUid: "-100"
            model:
              expression: "A"
              hide: false
              type: "reduce"
              reducer: "last"
              settings:
                mode: "dropNN"
              refId: "B"
          - refId: "C"
            datasourceUid: "-100"
            model:
              expression: "B"
              hide: false
              type: "threshold"
              conditions:
                - evaluator:
                    params: [4]
                    type: "gt"
                  operator:
                    type: "and"
                  query:
                    params: ["C"]
                  reducer:
                    params: []
                    type: "last"
                  type: "query"
              refId: "C"
        noDataState: "OK"
        execErrState: "Error"
        for: "0m"
        annotations:
          summary: "Detected failed SSH login attempt"
          description: 'Detected 5+ "Failed password" entries from IP {{ $labels.source_ip }} on host {{ $labels.host }} ({{ $labels.host_ip }}) within 30 seconds.'
        labels:
          severity: "critical"
